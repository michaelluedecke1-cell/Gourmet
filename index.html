<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Gourmet Archiv Pro Plus</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f97316">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3839/3839530.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .modal-active { opacity: 1 !important; pointer-events: auto !important; transform: scale(1) !important; }
        .hidden-view { display: none !important; }
        .active-tab { border-bottom: 4px solid #f97316; color: #f97316; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20 font-sans">

    <nav class="bg-white border-b sticky top-0 z-50 shadow-sm">
        <div class="max-w-2xl mx-auto px-3 h-16 flex items-center justify-between">
            <h1 class="text-base font-black text-orange-600">🍳 Archiv</h1>
            <div class="flex gap-2">
                <button onclick="openBackupModal()" class="px-2.5 py-2 bg-orange-50 text-orange-600 rounded-xl text-[10px] font-bold">Backup</button>
                <label class="px-2.5 py-2 bg-slate-100 text-slate-600 rounded-xl cursor-pointer text-[10px] font-bold">
                    Laden <input type="file" id="importFile" class="hidden" accept=".json" onchange="importBackup(event)">
                </label>
            </div>
        </div>
        <div class="flex max-w-2xl mx-auto border-t bg-white">
            <button id="tab-editor" onclick="switchView('editor')" class="flex-1 py-4 font-bold text-sm active-tab">📝 Eingabe</button>
            <button id="tab-list" onclick="switchView('list')" class="flex-1 py-4 font-bold text-sm text-slate-400">📖 Rezepte</button>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto p-4">
        <!-- Maske 1: Eingabe -->
        <div id="view-editor" class="view-content">
            <div class="bg-white rounded-3xl shadow-lg p-6 border border-slate-100">
                <h2 id="formTitle" class="text-lg font-bold mb-4 text-slate-700">Neues Rezept</h2>
                <input type="text" id="recipeTitle" placeholder="Titel..." class="w-full p-4 bg-slate-50 rounded-2xl mb-3 text-xl font-bold outline-none border border-transparent focus:border-orange-400">
                <input type="text" id="recipeCategory" placeholder="Kategorie..." class="w-full p-3 bg-slate-50 rounded-xl mb-3 text-sm outline-none border border-transparent focus:border-orange-400">
                <textarea id="recipeContent" rows="12" placeholder="Zutaten & Schritte..." class="w-full p-4 bg-slate-50 rounded-2xl outline-none border border-transparent focus:border-orange-400 text-lg custom-scroll mb-4"></textarea>
                <button id="saveBtn" onclick="saveRecipe()" class="w-full bg-orange-500 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all text-sm uppercase">Speichern</button>
            </div>
        </div>

        <!-- Maske 2: Rezepte -->
        <div id="view-list" class="view-content hidden-view">
            <div class="flex items-center gap-2 mb-4">
                <button id="wakeLockBtn" onclick="toggleWakeLock()" class="px-3 py-2 bg-slate-100 text-slate-600 rounded-xl text-[10px] font-bold">
                    🕯️ Display AN: <span id="wakeStatus">OFF</span>
                </button>
            </div>
            <input type="text" id="searchInput" onkeyup="renderRecipes()" placeholder="🔍 Suche..." class="w-full p-4 bg-white border rounded-2xl outline-none shadow-sm focus:border-orange-400 text-lg mb-4">
            <div id="categoryFilters" class="flex flex-wrap gap-2 mb-6"></div>
            <div id="recipeList" class="space-y-6"></div>
        </div>
    </main>

    <!-- Modal für Backup -->
    <div id="backupModal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 opacity-0 pointer-events-none transition-all duration-200">
        <div class="bg-white rounded-3xl p-6 max-w-sm w-full mx-4 shadow-2xl text-center border border-slate-100">
            <h3 class="text-base font-bold text-slate-800 mb-4">Backup erstellen?</h3>
            <div class="flex gap-3">
                <button onclick="closeBackupModal()" class="flex-1 py-3 bg-slate-100 text-slate-500 rounded-2xl text-[11px] font-bold">Abbrechen</button>
                <button onclick="confirmDownload()" class="flex-1 py-3 bg-orange-500 text-white rounded-2xl text-[11px] font-bold">Herunterladen</button>
            </div>
        </div>
    </div>

    <script>
        const DB_NAME = 'GourmetArchivDB';
        const STORE_NAME = 'recipes';
        let editId = null;
        let activeCategory = 'Alle';
        let wakeLock = null;

        // DB öffnen
        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => e.target.result.createObjectStore(STORE_NAME, { keyPath: 'id' });
                request.onsuccess = (e) => resolve(e.target.result);
                request.onerror = (e) => reject(e.target.error);
            });
        }

        function switchView(view) {
            document.getElementById('view-editor').classList.toggle('hidden-view', view !== 'editor');
            document.getElementById('view-list').classList.toggle('hidden-view', view !== 'list');
            document.getElementById('tab-editor').classList.toggle('active-tab', view === 'editor');
            document.getElementById('tab-list').classList.toggle('active-tab', view === 'list');
            if(view === 'list') renderRecipes();
        }

        async function saveRecipe() {
            const t = document.getElementById('recipeTitle'), c = document.getElementById('recipeContent'), cat = document.getElementById('recipeCategory');
            if(!t.value || !c.value) return;
            const db = await openDB();
            const tx = db.transaction(STORE_NAME, 'readwrite');
            await tx.objectStore(STORE_NAME).put({
                id: editId || Date.now(),
                title: t.value,
                content: c.value,
                category: cat.value.trim() || 'Allgemein',
                date: new Date().toLocaleDateString('de-DE')
            });
            t.value = ''; c.value = ''; cat.value = '';
            editId = null;
            switchView('list');
        }

        async function renderRecipes() {
            const db = await openDB();
            const recipes = await new Promise(res => {
                const req = db.transaction(STORE_NAME).objectStore(STORE_NAME).getAll();
                req.onsuccess = () => res(req.result);
            });
            const list = document.getElementById('recipeList');
            const query = document.getElementById('searchInput').value.toLowerCase();
            list.innerHTML = '';
            
            const sorted = recipes.sort((a,b) => b.id - a.id);
            const categories = ['Alle', ...new Set(sorted.map(r => r.category))];
            document.getElementById('categoryFilters').innerHTML = categories.map(cat => `
                <button onclick="activeCategory='${cat}';renderRecipes()" class="px-3 py-1.5 rounded-full text-[10px] font-bold border ${activeCategory===cat?'bg-orange-500 text-white':'bg-white text-slate-500'}">${cat}</button>
            `).join('');

            sorted.filter(r => (activeCategory==='Alle'||r.category===activeCategory) && (r.title.toLowerCase().includes(query))).forEach(r => {
                const card = document.createElement('div');
                card.className = 'bg-white p-6 rounded-3xl shadow-sm border border-slate-100';
                card.innerHTML = `<div class="flex justify-between border-b pb-3 mb-4">
                    <div><h3 class="font-bold text-xl">${r.title}</h3><span class="text-[9px] bg-orange-100 text-orange-600 px-2 py-0.5 rounded uppercase font-bold">${r.category}</span></div>
                    <div class="flex gap-1"><button onclick="editRecipe(${r.id})">✏️</button><button onclick="deleteRecipe(${r.id})">🗑️</button></div>
                </div><div class="whitespace-pre-wrap text-lg text-slate-600">${r.content}</div>`;
                list.appendChild(card);
            });
        }

        async function editRecipe(id) {
            const db = await openDB();
            const req = db.transaction(STORE_NAME).objectStore(STORE_NAME).get(id);
            req.onsuccess = () => {
                const r = req.result;
                document.getElementById('recipeTitle').value = r.title;
                document.getElementById('recipeContent').value = r.content;
                document.getElementById('recipeCategory').value = r.category;
                editId = id; switchView('editor');
            };
        }

        async function deleteRecipe(id) {
            if(confirm("Löschen?")) {
                const db = await openDB();
                const tx = db.transaction(STORE_NAME, 'readwrite');
                tx.objectStore(STORE_NAME).delete(id);
                tx.oncomplete = () => renderRecipes();
            }
        }

        // --- FIX FÜR BACKUP & LADEN ---
        function openBackupModal() { document.getElementById('backupModal').classList.add('modal-active'); }
        function closeBackupModal() { document.getElementById('backupModal').classList.remove('modal-active'); }

        async function confirmDownload() {
            const db = await openDB();
            const req = db.transaction(STORE_NAME).objectStore(STORE_NAME).getAll();
            req.onsuccess = () => {
                const data = JSON.stringify(req.result, null, 2);
                const blob = new Blob([data], {type: 'application/json'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `rezepte_backup_${new Date().toISOString().slice(0,10)}.json`;
                a.click();
                URL.revokeObjectURL(url);
                closeBackupModal();
            };
        }

        async function importBackup(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    const db = await openDB();
                    const tx = db.transaction(STORE_NAME, 'readwrite');
                    const store = tx.objectStore(STORE_NAME);
                    for (const item of imported) {
                        store.put(item);
                    }
                    tx.oncomplete = () => {
                        alert("Import erfolgreich!");
                        renderRecipes();
                        switchView('list');
                    };
                } catch (err) {
                    alert("Fehler beim Importieren der Datei.");
                }
            };
            reader.readAsText(file);
        }

        async function toggleWakeLock() {
            if (!('wakeLock' in navigator)) return;
            try {
                if (!wakeLock) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    document.getElementById('wakeStatus').innerText = 'AN';
                } else {
                    await wakeLock.release(); wakeLock = null;
                    document.getElementById('wakeStatus').innerText = 'OFF';
                }
            } catch (err) {}
        }

        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
</body>
</html>
